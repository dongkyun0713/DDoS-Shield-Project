spring:
  config:
    activate:
      on-profile: "datasource"
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_NAME}?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
